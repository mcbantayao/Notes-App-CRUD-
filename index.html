<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">  <!-- ✅ ADD THIS -->
    <title>Notes App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .input-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #notesList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            padding: 0;
        }

        li {
            list-style: none;
        }

        .note {
            background: #fff9c4;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .note-content {
            white-space: pre-wrap; /* preserves paragraphs */
            margin-bottom: 10px;
        }

        .note-footer {
            font-size: 12px;
            color: #555;
        }

        .actions {
            margin-top: 10px;
        }

        .actions button {
            margin-right: 5px;
            background-color: #28a745;
        }

        .actions button.delete {
            background-color: #dc3545;
        }

        .actions button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<h1>📝 Notes App</h1>

<div class="input-container">
    <textarea id="noteInput" placeholder="Write your note here..."></textarea>
    <button onclick="createNote()">Add Note</button>
</div>

<ul id="notesList"></ul>

<script>
const API_URL = "https://bqoo0ey1td.execute-api.ap-southeast-1.amazonaws.com/deploynotesapi/notes";

function formatDate(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);

    return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

async function fetchNotes() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const notes = Array.isArray(data) ? data : JSON.parse(data.body || "[]");

    const list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach(note => {
        const li = document.createElement("li");

        li.innerHTML = `
            <div class="note">
                <div class="note-content">${note.content}</div>

                <div class="note-footer">
                    Created: ${formatDate(note.createdAt)}<br>
                    Updated: ${formatDate(note.updatedAt)}
                </div>

                <div class="actions">
                    <button onclick="editNote('${note.id}', \`${note.content}\`)">Edit</button>
                    <button class="delete" onclick="deleteNote('${note.id}')">Delete</button>
                </div>
            </div>
        `;

        list.appendChild(li);
    });
}

async function createNote() {
    const content = document.getElementById("noteInput").value;

    if (!content) return;

    await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ content })
    });

    document.getElementById("noteInput").value = "";
    fetchNotes();
}

async function deleteNote(id) {
    await fetch(API_URL, {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id })
    });

    fetchNotes();
}

async function editNote(id, oldContent) {
    const newContent = prompt("Edit note:", oldContent);

    if (!newContent) return;

    await fetch(API_URL, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, content: newContent })
    });

    fetchNotes();
}

fetchNotes();
</script>

</body>
</html>
